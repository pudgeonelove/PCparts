<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>PC Store</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
    }
    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
    }
    nav button {
      margin: 5px;
      padding: 10px;
      background: #3b82f6;
      border: none;
      color: white;
      cursor: pointer;
    }
    .container {
      padding: 20px;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px;
      display: inline-block;
      width: 250px;
      border-radius: 10px;
    }
    .card button {
      margin-top: 10px;
      background: #22c55e;
      border: none;
      padding: 8px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>PC Store</h1>
  <nav>
    <button onclick="showCategory('cpu')">Процессоры</button>
    <button onclick="showCategory('gpu')">Видеокарты</button>
    <button onclick="showCategory('ram')">Оперативка</button>
  </nav>
</header>

<div class="container" id="products"></div>

<script>
const data = {
  cpu: [
    {name: "Intel i5", price: "150$"},
    {name: "AMD Ryzen 5", price: "140$"}
  ],
  gpu: [
    {name: "RTX 3060", price: "300$"},
    {name: "RX 6600", price: "280$"}
  ],
  ram: [
    {name: "16GB DDR4", price: "60$"},
    {name: "32GB DDR4", price: "110$"}
  ]
};

function showCategory(category) {
  const container = document.getElementById("products");
  container.innerHTML = "";
  
  data[category].forEach(item => {
    container.innerHTML += `
      <div class="card">
        <h3>${item.name}</h3>
        <p>Цена: ${item.price}</p>
        <button onclick="buy('${item.name}')">Купить</button>
      </div>
    `;
  });
}

function buy(name) {
  alert("Вы купили: " + name);
}
</script>

</body>
</html>
